<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8"><title>Logga in - Hushållshubben</title>
    <style>body{font-family:Arial; max-width:400px; margin:80px auto; padding:20px;}</style>
</head>
<body>
    <h1>Logga in 🧹</h1>
    <form method="POST">
        <input type="email" name="email" placeholder="E-postadress" required style="width:100%; padding:10px; margin-bottom:10px;"><br>
        <input type="password" name="password" placeholder="Lösenord" required style="width:100%; padding:10px; margin-bottom:15px;"><br>
        <button type="submit" style="width:100%; padding:10px; background:#10b981; color:white; border:none; border-radius:4px;">Logga in</button>
    </form>
    <p style="text-align:center;"><a href="/register">Inget konto? Registrera dig här</a></p>
</body>
</html>
