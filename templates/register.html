<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8"><title>Registrera konto - Hushållshubben</title>
    <style>body{font-family:Arial; max-width:400px; margin:80px auto; padding:20px;}</style>
</head>
<body>
    <h1>Skapa konto 🔑</h1>
    <form method="POST">
        <input type="text" name="name" placeholder="Ditt namn" required style="width:100%; padding:10px; margin-bottom:10px;"><br>
        <input type="email" name="email" placeholder="E-postadress" required style="width:100%; padding:10px; margin-bottom:10px;"><br>
        <input type="password" name="password" placeholder="Välj lösenord" required style="width:100%; padding:10px; margin-bottom:15px;"><br>
        <button type="submit" style="width:100%; padding:10px; background:#3b82f6; color:white; border:none; border-radius:4px;">Registrera</button>
    </form>
    <p style="text-align:center;"><a href="/login">Redan ett konto? Logga in här</a></p>
</body>
</html>
