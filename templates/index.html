<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hushållshubben</title>
    <!-- Vi lägger till enkel styling direkt så det ser okej ut från start -->
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .chore-list { list-style: none; padding: 0; }
        .chore-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .completed { text-decoration: line-through; color: #888; }
        input[type="text"] { padding: 8px; width: 70%; }
        button { padding: 8px 15px; }
    </style>
</head>
<body>

    <h1>Hushållshubben 🧹</h1>
    <p>Här är familjens sysslor live från Supabase:</p>

    <!-- Formulär för att lägga till en syssla -->
    <form action="/add" method="POST" style="margin-bottom: 20px;">
        <input type="text" name="title" placeholder="T.ex. Dammsuga vardagsrummet" required>
        
        <!-- Rullgardinsmeny med familjemedlemmar -->
        <select name="assigned_to">
            <option value="">Ingen specifik (Alla) 👥</option>
            {% for user in users %}
                <option value="{{ user.id }}">{{ user.name }}</option>
            {% endfor %}
        </select>

        <button type="submit">Lägg till</button>
    </form>

    <!-- Lista med sysslor -->
    <ul class="chore-list">
        {% for chore in chores %}
            <li class="chore-item">
                <span class="{% if chore.is_completed %}completed{% endif %}">
                    {{ chore.title }}
                </span>
                
                <span>
                    {% if chore.is_completed %}
                        ✅
                    {% else %}
                        <!-- Ett litet formulär med en knapp för varje enskild syssla -->
                        <form action="/complete/{{ chore.id }}" method="POST" style="display: inline;">
                            <button type="submit" style="padding: 2px 8px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">
                                Klar! 👍
                            </button>
                        </form>
                    {% endif %}
                </span>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
